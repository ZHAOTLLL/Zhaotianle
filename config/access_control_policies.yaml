# 无人机访问控制策略配置文件
# Drone Access Control Policies Configuration
# 基于合肥空域配置的三级访问控制策略

access_control:
  policies:
      # ==================== 第二级：区域访问控制 ====================
    
    # 政府紧急响应完全权限
    - rule_id: "government_emergency_full_access"
      name: "政府紧急响应完全权限"
      description: "政府紧急响应部门在任何情况下都有完全访问权限"
      priority: 100
      effect: "PERMIT"
      subject_condition: "organization == 'government' AND role == 'emergency' AND trust_level == 'high'"
      resource_condition: "true"
      action_condition: "true"
      environment_condition: "true"
      is_active: true
      
    # 政府一般部门访问权限
    - rule_id: "government_general_access"
      name: "政府一般部门访问权限"
      description: "政府一般部门在正常条件下的访问权限"
      priority: 90
      effect: "PERMIT"
      subject_condition: "organization == 'government' AND role IN 'admin,operator' AND trust_level IN 'medium,high'"
      resource_condition: "target_location NOT CONTAINS '军事' AND target_location NOT CONTAINS '机场'"
      action_condition: "operation_type IN 'surveillance,monitoring,inspection'"
      environment_condition: "weather_condition != 'severe'"
      is_active: true
      
    # 大学区域教育研究权限
    - rule_id: "university_educational_access"
      name: "大学区域教育研究权限"
      description: "大学区域内的教育和研究活动访问权限"
      priority: 80
      effect: "PERMIT"
      subject_condition: "organization == 'university' AND role IN 'student,researcher,operator' AND trust_level IN 'medium,high'"
      resource_condition: "target_location CONTAINS '大学' OR target_location CONTAINS '学校'"
      action_condition: "operation_type IN 'surveillance,research,educational'"
      environment_condition: "weather_condition != 'severe' AND (time_of_day == 'day' OR emergency_status == 'emergency')"
      is_active: true
      
    # 商业区域配送权限
    - rule_id: "commercial_delivery_access"
      name: "商业区域配送权限"
      description: "商业区域的配送服务访问权限"
      priority: 70
      effect: "PERMIT"
      subject_condition: "organization == 'commercial' AND role == 'delivery' AND trust_level IN 'medium,high'"
      resource_condition: "target_location CONTAINS '商业' OR target_location CONTAINS '中心'"
      action_condition: "operation_type == 'delivery'"
      environment_condition: "weather_condition IN 'clear,cloudy' AND emergency_status == 'normal'"
      is_active: true
      
  
    
    # 学校区域严格限制
    - rule_id: "school_area_restriction"
      name: "学校区域严格限制"
      description: "学校区域只允许紧急和监控操作"
      priority: 60
      effect: "PERMIT"
      subject_condition: "role IN 'emergency,police,monitoring' AND trust_level IN 'medium,high,critical'"
      resource_condition: "target_location CONTAINS '中学' OR target_location CONTAINS '小学'"
      action_condition: "operation_type IN 'emergency,monitoring'"
      environment_condition: "emergency_status == 'emergency' OR (time_of_day == 'day' AND school_hours == false)"
      is_active: true
      
    # 医院区域紧急权限
    - rule_id: "hospital_emergency_access"
      name: "医院区域紧急权限"
      description: "医院区域的紧急医疗访问权限"
      priority: 85
      effect: "PERMIT"
      subject_condition: "role IN 'emergency,medical,police' AND trust_level IN 'high,critical'"
      resource_condition: "target_location CONTAINS '医院' OR target_location CONTAINS '医疗'"
      action_condition: "operation_type IN 'emergency,medical,surveillance'"
      environment_condition: "true"
      is_active: true
      
    # 住宅区域隐私保护
    - rule_id: "residential_privacy_protection"
      name: "住宅区域隐私保护"
      description: "住宅区域的隐私保护访问控制"
      priority: 80
      effect: "DENY"
      subject_condition: "trust_level != 'critical' AND role NOT_IN 'emergency,police'"
      resource_condition: "target_location CONTAINS '住宅' OR target_location CONTAINS '小区'"
      action_condition: "operation_type IN 'surveillance,monitoring'"
      environment_condition: "emergency_status != 'emergency'"
      is_active: true
      
    # 机场区域严格限制
    - rule_id: "airport_restricted_access"
      name: "机场区域严格限制"
      description: "机场区域只允许授权操作"
      priority: 95
      effect: "DENY"
      subject_condition: "organization != 'government' AND role NOT_IN 'emergency,police,admin'"
      resource_condition: "target_location CONTAINS '机场'"
      action_condition: "operation_type NOT_IN 'emergency,security'"
      environment_condition: "true"
      is_active: true
      
    # 军事区域完全禁止
    - rule_id: "military_restricted_access"
      name: "军事区域完全禁止"
      description: "军事区域完全禁止非授权访问"
      priority: 99
      effect: "DENY"
      subject_condition: "organization != 'government' OR role NOT_IN 'emergency,police,admin' OR trust_level != 'critical'"
      resource_condition: "target_location CONTAINS '军事' OR target_location CONTAINS '基地'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 紧急医疗快速通道
    - rule_id: "emergency_medical_fasttrack"
      name: "紧急医疗快速通道"
      description: "医疗与救援部门在紧急情况下获得直接访问"
      priority: 98
      effect: "PERMIT"
      subject_condition: "organization IN 'emergency_services,hospital' AND role IN 'medical,emergency' AND trust_level IN 'high,critical'"
      resource_condition: "true"
      action_condition: "operation_type IN 'emergency,medical,medevac'"
      environment_condition: "emergency_status == 'emergency'"
      is_active: true

    # 公安安全巡逻通道
    - rule_id: "police_security_override"
      name: "公安安全巡逻通道"
      description: "公安部门在安全巡逻任务时获得高优先级通行"
      priority: 92
      effect: "PERMIT"
      subject_condition: "organization == 'police' AND role IN 'patrol,security' AND trust_level IN 'high,critical'"
      resource_condition: "target_location NOT CONTAINS '军事'"
      action_condition: "operation_type IN 'surveillance,security,patrol'"
      environment_condition: "time_of_day == 'day' OR emergency_status == 'emergency'"
      is_active: true

    # 夜间飞行限制
    - rule_id: "nighttime_regional_restriction"
      name: "夜间飞行区域限制"
      description: "夜间禁止中低信任级别无人机在敏感区域飞行"
      priority: 88
      effect: "DENY"
      subject_condition: "trust_level NOT_IN 'high,critical'"
      resource_condition: "target_location CONTAINS '商业' OR target_location CONTAINS '中心' OR target_location CONTAINS '住宅'"
      action_condition: "true"
      environment_condition: "time_of_day == 'night'"
      is_active: true

    # 恶劣天气安全限制
    - rule_id: "severe_weather_regional_restriction"
      name: "恶劣天气区域限制"
      description: "恶劣天气期间禁止非必要飞行"
      priority: 87
      effect: "DENY"
      subject_condition: "mission_type NOT_IN 'rescue,emergency'"
      resource_condition: "true"
      action_condition: "true"
      environment_condition: "weather_condition IN 'storm,severe,extreme'"
      is_active: true

    # 基础设施巡检许可
    - rule_id: "critical_infrastructure_inspection"
      name: "关键基础设施巡检许可"
      description: "可信商业或政府无人机在关键基础设施区域执行巡检"
      priority: 86
      effect: "PERMIT"
      subject_condition: "organization IN 'government,commercial' AND mission_type == 'inspection' AND trust_level IN 'medium,high,critical'"
      resource_condition: "target_location CONTAINS '桥梁' OR target_location CONTAINS '电站' OR target_location CONTAINS '输电'"
      action_condition: "operation_type IN 'inspection,monitoring'"
      environment_condition: "weather_condition NOT_IN 'storm,severe,extreme'"
      is_active: true

    # 工业危险品管控
    - rule_id: "industrial_hazard_restriction"
      name: "工业危险品管控"
      description: "工业危险区域禁止携带危险载荷的飞行"
      priority: 85
      effect: "DENY"
      subject_condition: "payload_type IN 'hazardous,flammable,chemical'"
      resource_condition: "target_location CONTAINS '化工' OR target_location CONTAINS '工业园'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 研究无人机高敏感区域限制
    - rule_id: "research_high_sensitivity_zone"
      name: "科研无人机高敏感区域限制"
      description: "科研无人机禁止进入高敏感区域"
      priority: 84
      effect: "DENY"
      subject_condition: "organization == 'university' OR mission_type == 'research'"
      resource_condition: "target_location CONTAINS '军事' OR target_location CONTAINS '政府' OR target_location CONTAINS '指挥中心'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 环境监测许可
    - rule_id: "environmental_monitoring_access"
      name: "环境监测许可"
      description: "环境监测任务在特定区域获得许可"
      priority: 83
      effect: "PERMIT"
      subject_condition: "mission_type == 'environmental' AND trust_level IN 'medium,high,critical'"
      resource_condition: "target_location CONTAINS '湖泊' OR target_location CONTAINS '湿地' OR target_location CONTAINS '生态'"
      action_condition: "operation_type IN 'monitoring,research'"
      environment_condition: "weather_condition NOT_IN 'storm,extreme'"
      is_active: true

    # 物流枢纽航线限制
    - rule_id: "logistics_hub_restriction"
      name: "物流枢纽航线限制"
      description: "物流枢纽仅允许授权的高信任物流无人机进入"
      priority: 82
      effect: "DENY"
      subject_condition: "organization NOT_IN 'commercial,government' OR trust_level NOT_IN 'high,critical'"
      resource_condition: "target_location CONTAINS '物流' OR target_location CONTAINS '仓储'"
      action_condition: "operation_type NOT_IN 'delivery,resupply'"
      environment_condition: "true"
      is_active: true

    # 农田巡检许可
    - rule_id: "agricultural_monitoring_access"
      name: "农田巡检许可"
      description: "农业巡检无人机在白天可访问农田区域"
      priority: 81
      effect: "PERMIT"
      subject_condition: "mission_type IN 'agriculture,environmental' AND trust_level IN 'medium,high,critical'"
      resource_condition: "target_location CONTAINS '农田' OR target_location CONTAINS '农业'"
      action_condition: "operation_type IN 'monitoring,spraying'"
      environment_condition: "time_of_day == 'day'"
      is_active: true

    # 体育赛事禁飞
    - rule_id: "sports_event_no_fly"
      name: "体育赛事禁飞"
      description: "大型体育赛事期间禁止非授权无人机飞行"
      priority: 80
      effect: "DENY"
      subject_condition: "organization NOT_IN 'government,police'"
      resource_condition: "target_location CONTAINS '体育场' OR target_location CONTAINS '体育馆'"
      action_condition: "true"
      environment_condition: "event_type == 'sports_event'"
      is_active: true

    # 景区白天访问许可
    - rule_id: "tourist_area_daytime_access"
      name: "景区白天访问许可"
      description: "对授权的旅游巡检无人机开放白天访问"
      priority: 79
      effect: "PERMIT"
      subject_condition: "mission_type IN 'tourism,inspection' AND trust_level IN 'medium,high'"
      resource_condition: "target_location CONTAINS '景区' OR target_location CONTAINS '公园'"
      action_condition: "operation_type IN 'monitoring,inspection'"
      environment_condition: "time_of_day == 'day' AND weather_condition NOT_IN 'storm,severe'"
      is_active: true

    # 文化遗产区域限制
    - rule_id: "cultural_heritage_protection"
      name: "文化遗产区域限制"
      description: "文化遗产区域限制非政府无人机进入"
      priority: 78
      effect: "DENY"
      subject_condition: "organization NOT_IN 'government,police'"
      resource_condition: "target_location CONTAINS '博物馆' OR target_location CONTAINS '遗址' OR target_location CONTAINS '古迹'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 交通拥堵应急通道
    - rule_id: "traffic_congestion_emergency_access"
      name: "交通拥堵应急通道"
      description: "交通拥堵情况下允许政府或应急无人机执行监控与疏导任务"
      priority: 77
      effect: "PERMIT"
      subject_condition: "organization IN 'government,police,emergency_services' AND trust_level IN 'medium,high,critical'"
      resource_condition: "target_location CONTAINS '高架' OR target_location CONTAINS '快速路' OR target_location CONTAINS '主干道'"
      action_condition: "operation_type IN 'monitoring,emergency'"
      environment_condition: "traffic_condition IN 'congested,critical'"
      is_active: true

    # 边境与海关区域限制
    - rule_id: "border_control_restriction"
      name: "边境与海关区域限制"
      description: "边境与重要海关口岸限制非授权无人机进入"
      priority: 76
      effect: "DENY"
      subject_condition: "organization NOT_IN 'government,police,customs'"
      resource_condition: "target_location CONTAINS '边境' OR target_location CONTAINS '海关' OR target_location CONTAINS '口岸'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 校园活动特殊许可
    - rule_id: "campus_event_special_access"
      name: "校园活动特殊许可"
      description: "校园大型活动期间授权教育单位执行特定任务"
      priority: 74
      effect: "PERMIT"
      subject_condition: "organization == 'university' AND role IN 'organizer,security' AND trust_level IN 'medium,high'"
      resource_condition: "target_location CONTAINS '校园' OR target_location CONTAINS '大学'"
      action_condition: "operation_type IN 'monitoring,recording'"
      environment_condition: "event_type == 'campus_event' AND time_of_day IN 'day,evening'"
      is_active: true

    # 低空物流高速通道
    - rule_id: "low_altitude_logistics_corridor"
      name: "低空物流高速通道"
      description: "特定低空走廊允许高信任物流无人机快速经过"
      priority: 73
      effect: "PERMIT"
      subject_condition: "organization == 'commercial' AND mission_type == 'logistics' AND trust_level IN 'high,critical'"
      resource_condition: "target_location CONTAINS '低空走廊' OR target_location CONTAINS '物流通道'"
      action_condition: "operation_type == 'delivery'"
      environment_condition: "weather_condition NOT_IN 'storm,severe,extreme'"
      is_active: true

    # 远程山区救援许可
    - rule_id: "mountain_rescue_access"
      name: "山区救援特殊许可"
      description: "山区救援任务在恶劣环境下获得通行特权"
      priority: 72
      effect: "PERMIT"
      subject_condition: "mission_type == 'rescue' AND organization IN 'emergency_services,government'"
      resource_condition: "target_location CONTAINS '山区' OR target_location CONTAINS '峡谷'"
      action_condition: "operation_type IN 'emergency,rescue'"
      environment_condition: "true"
      is_active: true

    # 特种设备调试限制
    - rule_id: "special_equipment_testing_restriction"
      name: "特种设备调试区域限制"
      description: "特种调试区域禁止标准无人机进入"
      priority: 71
      effect: "DENY"
      subject_condition: "organization NOT_IN 'government,research'"
      resource_condition: "target_location CONTAINS '实验场' OR target_location CONTAINS '测试场'"
      action_condition: "true"
      environment_condition: "true"
      is_active: true

    # 港口物流特殊许可
    - rule_id: "harbor_logistics_access"
      name: "港口物流特殊许可"
      description: "港口物流区域允许认证无人机执行调度任务"
      priority: 70
      effect: "PERMIT"
      subject_condition: "organization IN 'commercial,government' AND mission_type IN 'logistics,inspection'"
      resource_condition: "target_location CONTAINS '港口' OR target_location CONTAINS '码头'"
      action_condition: "operation_type IN 'delivery,inspection'"
      environment_condition: "weather_condition NOT_IN 'storm,extreme'"
      is_active: true
      
    # === 自动生成区域访问策略（500条） ===
    - rule_id: "generated_policy_0001"
      name: "自动生成策略 0001"
      description: "自动生成的区域访问控制策略 1"
      priority: 33
      effect: "DENY"
      subject_condition: "organization == 'commercial' AND role IN 'admin,delivery' AND trust_level IN 'medium,low' AND mission_type IN 'surveillance,inspection'"
      resource_condition: "target_location CONTAINS '商业'"
      action_condition: "operation_type IN 'research,inspection'"
      environment_condition: "weather_condition IN 'storm,rainy' AND time_of_day IN 'morning,night'"
      is_active: true
    - rule_id: "generated_policy_0002"
      name: "自动生成策略 0002"
      description: "自动生成的区域访问控制策略 2"
      priority: 74
      effect: "DENY"
      subject_condition: "organization == 'research' AND role IN 'researcher,emergency' AND trust_level IN 'high,low' AND mission_type IN 'surveillance,agriculture'"
      resource_condition: "target_location CONTAINS '商业'"
      action_condition: "operation_type IN 'surveillance,rescue'"
      environment_condition: "weather_condition IN 'cloudy,snow' AND time_of_day IN 'evening,morning'"
      is_active: true
    - rule_id: "generated_policy_0003"
      name: "自动生成策略 0003"
      description: "自动生成的区域访问控制策略 3"
      priority: 59
      effect: "PERMIT"
      subject_condition: "organization == 'government' AND role IN 'emergency,monitoring' AND trust_level IN 'low,medium' AND mission_type IN 'inspection,photography'"
      resource_condition: "target_location CONTAINS '学校'"
      action_condition: "operation_type IN 'rescue,surveillance'"
      environment_condition: "weather_condition IN 'storm,cloudy' AND time_of_day IN 'morning,night'"
      is_active: true
    - rule_id: "generated_policy_0004"
      name: "自动生成策略 0004"
      description: "自动生成的区域访问控制策略 4"
      priority: 78
      effect: "DENY"
      subject_condition: "organization == 'research' AND role IN 'delivery,emergency' AND trust_level IN 'high,low' AND mission_type IN 'logistics,research'"
      resource_condition: "target_location CONTAINS '住宅'"
      action_condition: "operation_type IN 'emergency,rescue'"
      environment_condition: "weather_condition IN 'fog,snow' AND time_of_day IN 'morning,evening' AND traffic_condition == 'busy'"
      is_active: true
    - rule_id: "generated_policy_0005"
      name: "自动生成策略 0005"
      description: "自动生成的区域访问控制策略 5"
      priority: 88
      effect: "PERMIT"
      subject_condition: "organization == 'police' AND role IN 'inspection,admin' AND trust_level IN 'medium,low' AND mission_type IN 'logistics,agriculture'"
      resource_condition: "target_location CONTAINS '港口'"
      action_condition: "operation_type IN 'rescue,inspection'"
      environment_condition: "weather_condition IN 'cloudy,storm' AND time_of_day IN 'evening,morning' AND traffic_condition == 'critical'"
      is_active: true
    - rule_id: "generated_policy_0006"
      name: "自动生成策略 0006"
      description: "自动生成的区域访问控制策略 6"
      priority: 44
      effect: "PERMIT"
      subject_condition: "organization == 'university' AND role IN 'researcher,monitoring' AND trust_level IN 'high,critical' AND mission_type IN 'research,agriculture'"
      resource_condition: "target_location CONTAINS '港口'"
      action_condition: "operation_type IN 'logistics,mapping'"
      environment_condition: "weather_condition IN 'windy,cloudy' AND time_of_day IN 'day,evening' AND traffic_condition == 'normal'"
      is_active: true
    - rule_id: "generated_policy_0007"
      name: "自动生成策略 0007"
      description: "自动生成的区域访问控制策略 7"
      priority: 73
      effect: "PERMIT"
      subject_condition: "organization == 'university' AND role IN 'security,pilot' AND trust_level IN 'low,medium' AND mission_type IN 'agriculture,environmental'"
      resource_condition: "target_location CONTAINS '物流'"
      action_condition: "operation_type IN 'research,rescue'"
      environment_condition: "weather_condition IN 'storm,clear' AND time_of_day IN 'morning,evening' AND traffic_condition == 'congested'"
      is_active: true
    - rule_id: "generated_policy_0008"
      name: "自动生成策略 0008"
      description: "自动生成的区域访问控制策略 8"
      priority: 50
      effect: "DENY"
      subject_condition: "organization == 'research' AND role IN 'observer,emergency' AND trust_level IN 'low,high' AND mission_type IN 'emergency,photography'"
      resource_condition: "target_location CONTAINS '物流'"
      action_condition: "operation_type IN 'monitoring,research'"
      environment_condition: "weather_condition IN 'clear,fog' AND time_of_day IN 'evening,night'"
      is_active: true
    - rule_id: "generated_policy_0009"
      name: "自动生成策略 0009"
      description: "自动生成的区域访问控制策略 9"
      priority: 46
      effect: "PERMIT"
      subject_condition: "organization == 'government' AND role IN 'pilot,inspection' AND trust_level IN 'critical,low' AND mission_type IN 'inspection,logistics'"
      resource_condition: "target_location CONTAINS '港口'"
      action_condition: "operation_type IN 'rescue,emergency'"
      environment_condition: "weather_condition IN 'clear,cloudy' AND time_of_day IN 'morning,night' AND traffic_condition == 'normal'"
      is_active: true
    - rule_id: "generated_policy_0010"
      name: "自动生成策略 0010"
      description: "自动生成的区域访问控制策略 10"
      priority: 77
      effect: "PERMIT"
      subject_condition: "organization == 'individual' AND role IN 'monitoring,observer' AND trust_level IN 'high,critical' AND mission_type IN 'research,agriculture'"
      resource_condition: "target_location CONTAINS '医院'"
      action_condition: "operation_type IN 'emergency,research'"
      environment_condition: "weather_condition IN 'snow,fog' AND time_of_day IN 'day,evening'"
      is_active: true
    - rule_id: "generated_policy_0011"
      name: "自动生成策略 0011"
      description: "自动生成的区域访问控制策略 11"
