syntax = "proto3";

package drone_control;

option go_package = "github.com/access_control_core/api-go/pkg/grpcpc";

// 地面端核心服务：仅保留与访问控制、无人机、飞行相关的 RPC；健康/资源/策略/展示由 Go 网关实现。
service DroneControlCore {
  rpc GetDrones(GetDronesRequest) returns (JsonResponse);
  rpc GetDroneStates(GetDroneStatesRequest) returns (JsonResponse);
  rpc GetDroneDetail(GetDroneDetailRequest) returns (JsonResponse);
  rpc FlightCommand(FlightCommandRequest) returns (JsonResponse);
  rpc FlightCommandWithParams(FlightCommandWithParamsRequest) returns (JsonResponse);
  rpc AutoFlightRequest(AutoFlightRequestReq) returns (JsonResponse);
  rpc GetFlightStatus(GetFlightStatusRequest) returns (JsonResponse);
  rpc EvaluateAccess(EvaluateAccessRequest) returns (JsonResponse);
  rpc ConfirmMission(ConfirmMissionRequest) returns (JsonResponse);
}

// 边缘设备服务：处理边缘设备的注册、心跳、状态同步和权限评估
service DroneControlService {
  rpc RegisterEdgeDevice(RegisterEdgeDeviceRequest) returns (RegisterEdgeDeviceResponse);
  rpc SyncDroneState(SyncDroneStateRequest) returns (SyncDroneStateResponse);
  rpc EvaluateEdgeAccess(EvaluateEdgeAccessRequest) returns (EvaluateEdgeAccessResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// 数据库服务：处理边缘设备信息和无人机状态的存储
service DatabaseService {
  rpc SaveEdgeDeviceInfo(SaveEdgeDeviceInfoRequest) returns (SaveEdgeDeviceInfoResponse);
  rpc SaveDroneState(SaveDroneStateRequest) returns (SaveDroneStateResponse);
}

message RegisterEdgeDeviceRequest {
  string device_id = 1;
  string device_name = 2;
  string location = 3;
}

message RegisterEdgeDeviceResponse {
  bool success = 1;
  string message = 2;
}

message SyncDroneStateRequest {
  string device_id = 1;
  int32 drone_id = 2;
  string state_json = 3;
}

message SyncDroneStateResponse {
  bool success = 1;
  string message = 2;
}

message EvaluateEdgeAccessRequest {
  string device_id = 1;
  int32 drone_id = 2;
  string request_json = 3;
  string geofence_token = 4;
  string edge_device_id = 5;
}

message EvaluateEdgeAccessResponse {
  bool access_granted = 1;
  string reason = 2;
  string token = 3;
  int64 validity_duration = 4;
  string decision = 5;
  string flight_plan_json = 6;
}

message HeartbeatRequest {
  string device_id = 1;
}

message HeartbeatResponse {
  string timestamp = 1;
  bool success = 2;
}

message SaveEdgeDeviceInfoRequest {
  string device_id = 1;
  string device_name = 2;
  string location = 3;
  bool online = 4;
}

message SaveEdgeDeviceInfoResponse {
  bool success = 1;
  string message = 2;
}

message SaveDroneStateRequest {
  int32 drone_id = 1;
  string state_json = 2;
  string device_id = 3;
}

message SaveDroneStateResponse {
  bool success = 1;
  string message = 2;
}

message JsonResponse {
  string json = 1;
  string error = 2;
}

message GetDronesRequest {}
message GetDroneStatesRequest {}
message GetDroneDetailRequest { int32 drone_id = 1; }

message FlightCommandRequest {
  int32 drone_id = 1;
  string command = 2;
}

message FlightCommandWithParamsRequest {
  int32 drone_id = 1;
  string command = 2;
  string params_json = 3;
}

message AutoFlightRequestReq {}
message GetFlightStatusRequest {}

message EvaluateAccessRequest { string request_json = 1; }
message ConfirmMissionRequest { int32 drone_id = 1; }